<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SkiZone | Streaming Anime Terbaru</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: 'Inter', 'Plus Jakarta Sans', sans-serif;
            color: #eef5ff;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1f24;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 1.25rem;
        }

        /* header */
        .logo-area {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #FFFFFF 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span {
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge-creator {
            background: rgba(59,130,246,0.2);
            border: 1px solid rgba(59,130,246,0.5);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }
        .badge-creator i {
            margin-right: 6px;
            color: #3b82f6;
        }

        /* search */
        .search-wrapper {
            margin: 1.5rem 0 2rem;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(20, 28, 35, 0.8);
            border-radius: 2rem;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            border: 1px solid #2d3748;
            transition: all 0.2s ease;
        }
        .search-box:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .search-box i {
            color: #6c86a3;
            font-size: 1.1rem;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 0.8rem;
            font-size: 1rem;
            color: white;
            outline: none;
            font-weight: 500;
        }
        .search-box input::placeholder {
            color: #6c86a3;
            font-weight: 400;
        }
        .search-box button {
            background: linear-gradient(105deg, #2563eb, #3b82f6);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .search-box button:hover {
            transform: scale(0.97);
        }

        /* section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 1.8rem 0 1rem;
        }
        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }

        /* chips */
        .chips-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 6px 0 12px;
            scrollbar-width: thin;
        }
        .chips-scroll::-webkit-scrollbar {
            display: none;
        }
        .chip {
            background: rgba(30, 40, 50, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.3rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid #2a3744;
            transition: all 0.2s;
            cursor: pointer;
        }
        .chip.active, .chip:active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59,130,246,0.4);
        }

        /* grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 0.5rem;
        }

        @media (min-width: 640px) {
            .anime-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .anime-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* card */
        .anime-card {
            background: rgba(18, 24, 32, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(59,130,246,0.2);
            text-decoration: none;
            display: block;
            color: white;
            cursor: pointer;
        }
        .anime-card:hover {
            transform: translateY(-6px);
            border-color: #3b82f6;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.3);
        }
        .poster {
            position: relative;
            padding-top: 140%;
            overflow: hidden;
        }
        .poster img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .anime-card:hover .poster img {
            transform: scale(1.05);
        }
        .ep-badge {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #90d0ff;
            border-left: 2px solid #3b82f6;
        }
        .card-info {
            padding: 0.9rem 0.8rem 1rem;
        }
        .card-info h3 {
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .meta-time {
            font-size: 0.65rem;
            color: #9ca9b9;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* loading */
        .loading-skeleton {
            background: linear-gradient(90deg, #1a222c 25%, #2a3340 50%, #1a222c 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 1rem;
            height: 270px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 2rem;
            margin-top: 1rem;
            grid-column: 1 / -1;
        }

        /* bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 380px;
            background: rgba(10, 14, 18, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            padding: 0.6rem 0.8rem;
            border: 1px solid rgba(59,130,246,0.3);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #8f9eb2;
            transition: 0.2s;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-item i {
            font-size: 1.3rem;
        }
        .nav-item.active {
            color: #3b82f6;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #4b5a6e;
            margin-top: 2rem;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="logo">Ski<span>Zone</span></div>
        <div class="badge-creator"><i class="fa-regular fa-user-astronaut"></i> created by sycho</div>
    </div>

    <div class="search-wrapper">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Cari anime favoritmu...">
            <button id="searchBtn"><i class="fa-regular fa-paper-plane"></i> Cari</button>
        </div>
    </div>

    <div class="section-header">
        <h2>🔥 Trending & Terbaru</h2>
    </div>
    <div class="chips-scroll" id="chipContainer">
        <div class="chip active" data-search="">Semua</div>
        <div class="chip" data-search="subtitle indonesia">Sub Indo</div>
        <div class="chip" data-search="donghua">Donghua</div>
        <div class="chip" data-search="isekai">Isekai</div>
        <div class="chip" data-search="action">Action</div>
    </div>

    <div id="animeGrid" class="anime-grid"></div>
    <div id="loadMoreTrigger" style="height: 10px; margin: 20px 0;"></div>
    <footer>⚡ SkiZone — Stream anime terbaru dari Anoboy • dibuat oleh sycho</footer>
</div>

<div class="bottom-nav">
    <div class="nav-item active" data-nav="home"><i class="fa-solid fa-house-chimney"></i><span>Beranda</span></div>
    <div class="nav-item" data-nav="search"><i class="fa-solid fa-compass"></i><span>Jelajah</span></div>
    <div class="nav-item" data-nav="fav"><i class="fa-regular fa-star"></i><span>Favorite</span></div>
    <div class="nav-item" data-nav="profile"><i class="fa-regular fa-user"></i><span>Akun</span></div>
</div>

<script>
    const API_BASE = "https://weeb-scraper.onrender.com/api/anoboy";
    
    let currentPage = 1;
    let currentQuery = "";
    let isLoading = false;
    let hasMore = true;
    
    const grid = document.getElementById("animeGrid");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");

    async function fetchAnime(page = 1, query = "") {
        if (isLoading) return;
        isLoading = true;
        
        if (page === 1) {
            grid.innerHTML = `
                ${Array(10).fill().map(() => `<div class="loading-skeleton"></div>`).join('')}
            `;
        }
        
        try {
            let url;
            if (query.trim() !== "") {
                url = `${API_BASE}?s=${encodeURIComponent(query)}`;
                hasMore = false;
            } else {
                url = `${API_BASE}?page=${page}`;
                hasMore = true;
            }
            
            const response = await fetch(url);
            const result = await response.json();
            
            let items = result.data || [];
            
            if (!query && result.next_page === null) {
                hasMore = false;
            }
            
            if (page === 1) {
                renderCards(items);
            } else {
                appendCards(items);
            }
            
            if (items.length === 0 && page === 1) {
                grid.innerHTML = `<div class="empty-state"><i class="fa-regular fa-face-frown" style="font-size: 2rem;"></i><p style="margin-top: 10px;">Tidak ada anime ditemukan</p></div>`;
            }
        } catch (err) {
            console.error(err);
            if (page === 1) {
                grid.innerHTML = `<div class="empty-state"><i class="fa-regular fa-circle-exclamation"></i><p>Gagal memuat data. Coba refresh.</p></div>`;
            }
        } finally {
            isLoading = false;
        }
    }
    
    function renderCards(items) {
        if (!items.length) {
            grid.innerHTML = `<div class="empty-state"><i class="fa-regular fa-folder-open"></i><p>Belum ada anime</p></div>`;
            return;
        }
        
        grid.innerHTML = items.map(anime => {
            let thumb = anime.thumbnail || "https://placehold.co/300x450/1e293b/3b82f6?text=No+Image";
            let title = anime.title || "Judul Tidak Diketahui";
            let upload = anime.upload_time || "Baru";
            let param = anime.param || "";
            
            return `
                <div class="anime-card" data-param="${param}" data-title="${escapeHtml(title)}">
                    <div class="poster">
                        <img src="${thumb}" alt="${title}" loading="lazy" onerror="this.src='https://placehold.co/300x450/1e293b/3b82f6?text=Error'">
                        <div class="ep-badge">${escapeHtml(upload.split(' ')[0] || 'Episode')}</div>
                    </div>
                    <div class="card-info">
                        <h3>${escapeHtml(title.length > 45 ? title.slice(0,45)+'...' : title)}</h3>
                        <div class="meta-time"><i class="fa-regular fa-clock"></i> ${escapeHtml(upload)}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.anime-card').forEach(card => {
            card.addEventListener('click', () => {
                const param = card.getAttribute('data-param');
                if (param) {
                    window.open(`https://weeb-scraper.onrender.com/api/anoboy/${param}`, '_blank');
                } else {
                    alert("Link tidak tersedia");
                }
            });
        });
    }
    
    function appendCards(items) {
        items.forEach(anime => {
            let thumb = anime.thumbnail || "https://placehold.co/300x450/1e293b/3b82f6?text=No+Image";
            let title = anime.title || "Judul Tidak Diketahui";
            let upload = anime.upload_time || "Baru";
            let param = anime.param || "";
            
            const card = document.createElement('div');
            card.className = "anime-card";
            card.setAttribute('data-param', param);
            card.innerHTML = `
                <div class="poster">
                    <img src="${thumb}" loading="lazy" onerror="this.src='https://placehold.co/300x450/1e293b/3b82f6?text=Error'">
                    <div class="ep-badge">${escapeHtml(upload.split(' ')[0] || 'Episode')}</div>
                </div>
                <div class="card-info">
                    <h3>${escapeHtml(title.length > 45 ? title.slice(0,45)+'...' : title)}</h3>
                    <div class="meta-time"><i class="fa-regular fa-clock"></i> ${escapeHtml(upload)}</div>
                </div>
            `;
            card.addEventListener('click', () => {
                if (param) {
                    window.open(`https://weeb-scraper.onrender.com/api/anoboy/${param}`, '_blank');
                }
            });
            grid.appendChild(card);
        });
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function loadTrending() {
        currentPage = 1;
        currentQuery = "";
        hasMore = true;
        fetchAnime(1, "");
    }
    
    function performSearch() {
        const query = searchInput.value.trim();
        currentQuery = query;
        currentPage = 1;
        if (query === "") {
            loadTrending();
        } else {
            fetchAnime(1, query);
        }
    }
    
    // chips
    document.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", function() {
            document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
            this.classList.add("active");
            const searchVal = this.getAttribute("data-search") || "";
            if (searchVal === "") {
                searchInput.value = "";
                loadTrending();
            } else {
                searchInput.value = searchVal;
                performSearch();
            }
        });
    });
    
    searchBtn.addEventListener("click", performSearch);
    searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") performSearch();
    });
    
    // infinite scroll
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isLoading && hasMore && currentQuery === "") {
            currentPage++;
            fetchAnime(currentPage, "");
        }
    }, { threshold: 0.5 });
    
    const loadTrigger = document.getElementById("loadMoreTrigger");
    if (loadTrigger) observer.observe(loadTrigger);
    
    // bottom nav
    document.querySelectorAll(".nav-item").forEach(nav => {
        nav.addEventListener("click", (e) => {
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            nav.classList.add("active");
            if (nav.getAttribute("data-nav") === "home") loadTrending();
            else if (nav.getAttribute("data-nav") === "search") searchInput.focus();
            else alert("Fitur sedang dalam pengembangan ~ sycho");
        });
    });
    
    // start
    loadTrending();
</script>
</body>
</html>
